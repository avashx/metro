<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 5 Route Opportunity Map</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Avenir Next', 'Segoe UI', Helvetica, sans-serif;
            background: linear-gradient(120deg, #EEF2F7 0%, #E7ECF4 100%);
            height: 100vh;
            padding: 14px;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 14px;
            height: 100%;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.94);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 10px 24px rgba(27, 39, 60, 0.12);
            overflow-y: auto;
        }

        .control-panel h3 {
            margin: 0 0 8px 0;
            color: #203040;
            font-size: 18px;
        }

        .control-panel > p {
            margin: 0 0 12px 0;
            color: #52606D;
            font-size: 13px;
            line-height: 1.4;
        }

        .slider-label {
            font-weight: 600;
            color: #263238;
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
        }

        input[type="range"] {
            width: 100%;
            margin: 8px 0;
            cursor: pointer;
        }

        .radius-display {
            margin-top: 8px;
            font-size: 12px;
            color: #4F5D6B;
        }

        .metrics {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #E0E6F2;
        }

        .metric {
            margin-bottom: 12px;
        }

        .metric-label {
            font-size: 12px;
            color: #60717F;
        }

        .metric-value {
            font-size: 22px;
            font-weight: 700;
            color: #0B3A6E;
        }

        .landuse-breakdown {
            font-size: 13px;
            color: #334155;
            margin-top: 12px;
        }

        .landuse-item {
            margin-bottom: 4px;
        }

        .landuse-color {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 8px;
            border-radius: 2px;
        }

        .map-container {
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(27, 39, 60, 0.12);
            background: #DDE4EE;
        }

        #route-map {
            width: 100%;
            height: 100%;
        }

        .slider-track {
            background: linear-gradient(to right, #0B3A6E, #69B8E8, #A7D96A, #F2D53C);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="control-panel">
            <h3>Layer</h3>
            <p>Possible station route with nearby land-use and population potential</p>

            <label class="slider-label">Catchment Radius Around Stations</label>
            <input type="range" id="radius-slider" min="200" max="2500" step="100" value="900" class="slider-track">
            <div class="radius-display" id="radius-text">Current reach: 900 m around each possible station</div>

            <div class="metrics">
                <div class="metric">
                    <div class="metric-label">Nearby population</div>
                    <div class="metric-value" id="population-kpi">0</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Visible opportunities</div>
                    <div class="metric-value" id="opportunity-kpi">0</div>
                </div>
            </div>

            <div class="landuse-breakdown" id="landuse-breakdown">
                <!-- Filled by JavaScript -->
            </div>
        </div>

        <div class="map-container">
            <div id="route-map"></div>
        </div>
    </div>

    <script>
        // Station data
        const existingStations = [
            { name: 'Nangloi', lat: 28.608, lon: 77.142, type: 'major' },
            { name: 'Nangloi Junction', lat: 28.598, lon: 77.155, type: 'major' },
            { name: 'Rajdhani Park', lat: 28.588, lon: 77.168, type: 'minor' },
            { name: 'Udyog Nagar', lat: 28.578, lon: 77.181, type: 'minor' }
        ];

        const proposedStations = [
            { name: 'Dhansa Bus Stand', lat: 28.612365, lon: 76.977768, type: 'major', isUnderground: false },
            { name: 'Mitraon', lat: 28.623174, lon: 76.993368, type: 'minor', isUnderground: false },
            { name: 'Dichaon Kalan', lat: 28.633983, lon: 77.008968, type: 'medium', isUnderground: false },
            { name: 'Baprola', lat: 28.644792, lon: 77.024568, type: 'minor', isUnderground: true },
            { name: 'Ranhola', lat: 28.655601, lon: 77.040167, type: 'major', isUnderground: true },
            { name: 'Nihal Vihar', lat: 28.662305, lon: 77.046331, type: 'medium', isUnderground: true },
            { name: 'Shiv Ram Park', lat: 28.66901, lon: 77.052494, type: 'minor', isUnderground: false },
            { name: 'Kavita Colony', lat: 28.675715, lon: 77.058657, type: 'minor', isUnderground: false },
            { name: 'Nangloi Metro', lat: 28.682419, lon: 77.064821, type: 'major', isUnderground: false }
        ];

        // Land use palette
        const landUsePalette = {
            'Residential': '#64B5F6',
            'Mixed Use': '#4DB6AC',
            'Commercial': '#2F4B9A',
            'Institutional': '#AED581',
            'Industrial': '#FDD835'
        };

        // Generate synthetic opportunities
        function generateOpportunities() {
            const opportunities = [];
            const landUseTypes = ['Residential', 'Mixed Use', 'Commercial', 'Institutional', 'Industrial'];
            const landUseProbs = [0.36, 0.20, 0.19, 0.14, 0.11];

            proposedStations.forEach(station => {
                const basePopulation = station.type === 'major' ? 12000 : station.type === 'medium' ? 9000 : 6000;

                for (let i = 0; i < 24; i++) {
                    const angle = Math.random() * 2 * Math.PI;
                    const distance = 120 + Math.random() * 2480;

                    const metersPerDegLat = 111320;
                    const metersPerDegLon = 111320 * Math.cos(station.lat * Math.PI / 180);

                    const dlat = (distance * Math.sin(angle)) / metersPerDegLat;
                    const dlon = (distance * Math.cos(angle)) / metersPerDegLon;

                    const lat = station.lat + dlat;
                    const lon = station.lon + dlon;

                    const landUseRand = Math.random();
                    let landUse = 'Residential';
                    let cumProb = 0;
                    for (let j = 0; j < landUseTypes.length; j++) {
                        cumProb += landUseProbs[j];
                        if (landUseRand < cumProb) {
                            landUse = landUseTypes[j];
                            break;
                        }
                    }

                    const useFactors = {
                        'Residential': 1.0,
                        'Mixed Use': 1.25,
                        'Commercial': 1.30,
                        'Institutional': 0.85,
                        'Industrial': 1.10
                    };

                    const useMultiplier = useFactors[landUse];
                    const basePop = basePopulation * useMultiplier;
                    const popPotential = Math.max(250, Math.floor(basePop * (0.06 + Math.random() * 0.16)));

                    opportunities.push({
                        station: station.name,
                        stationType: station.type,
                        stationLat: station.lat,
                        stationLon: station.lon,
                        landUse: landUse,
                        lat: lat,
                        lon: lon,
                        distance: distance,
                        populationPotential: popPotential
                    });
                }
            });

            return opportunities;
        }

        const opportunities = generateOpportunities();

        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const phi1 = lat1 * Math.PI / 180;
            const phi2 = lat2 * Math.PI / 180;
            const dphi = (lat2 - lat1) * Math.PI / 180;
            const dlambda = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(dphi / 2) ** 2 + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dlambda / 2) ** 2;
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function updateMap(radiusM) {
            // Filter opportunities
            const visibleOpps = opportunities.filter(opp => {
                const dist = haversineDistance(opp.lat, opp.lon, opp.stationLat, opp.stationLon);
                return dist <= radiusM;
            });

            // Calculate metrics
            const totalPop = visibleOpps.reduce((sum, opp) => sum + opp.populationPotential, 0);
            const byLandUse = {};
            visibleOpps.forEach(opp => {
                byLandUse[opp.landUse] = (byLandUse[opp.landUse] || 0) + opp.populationPotential;
            });

            // Update KPIs
            document.getElementById('population-kpi').textContent = totalPop.toLocaleString();
            document.getElementById('opportunity-kpi').textContent = visibleOpps.length.toLocaleString();
            document.getElementById('radius-text').textContent = `Current reach: ${radiusM.toLocaleString()} m around each possible station`;

            // Update land use breakdown
            const breakdownHtml = Object.entries(byLandUse)
                .sort((a, b) => b[1] - a[1])
                .map(([use, value]) => {
                    const color = landUsePalette[use] || '#607D8B';
                    return `<div class="landuse-item"><span class="landuse-color" style="background: ${color};"></span>${use}: ${value.toLocaleString()}</div>`;
                })
                .join('');
            document.getElementById('landuse-breakdown').innerHTML = breakdownHtml || '<div style="color: #8A9BA8;">No opportunities in the selected radius</div>';

            // Build map traces
            const traces = [];

            // Route line (shadow)
            traces.push({
                lat: proposedStations.map(s => s.lat),
                lon: proposedStations.map(s => s.lon),
                mode: 'lines',
                line: { color: 'rgba(255,255,255,0.95)', width: 8 },
                hoverinfo: 'skip',
                name: 'Phase 5 Route'
            });

            // Route line (core) - handle elevated and underground
            const firstUg = proposedStations.findIndex(s => s.isUnderground);
            const reverseUg = proposedStations.slice().reverse().findIndex(s => s.isUnderground);
            const lastUg = reverseUg !== -1 ? proposedStations.length - 1 - reverseUg : -1;
            
            let elevated1 = proposedStations, underground = [], elevated2 = [];
            if (firstUg !== -1) {
                elevated1 = proposedStations.slice(0, firstUg + 1);
                underground = proposedStations.slice(firstUg, lastUg + 1);
                elevated2 = proposedStations.slice(lastUg);
            }

            if (elevated1.length > 1) {
                traces.push({
                    lat: elevated1.map(s => s.lat), lon: elevated1.map(s => s.lon), mode: 'lines',
                    line: { color: '#2E7D78', width: 4 }, hoverinfo: 'skip', name: 'Elevated Route'
                });
            }
            if (underground.length > 1) {
                traces.push({
                    lat: underground.map(s => s.lat), lon: underground.map(s => s.lon), mode: 'lines',
                    line: { color: '#D84315', width: 4 }, hoverinfo: 'skip', name: 'Underground (Congested Zone)'
                });
            }
            if (elevated2.length > 1) {
                traces.push({
                    lat: elevated2.map(s => s.lat), lon: elevated2.map(s => s.lon), mode: 'lines',
                    line: { color: '#2E7D78', width: 4 }, hoverinfo: 'skip', name: 'Elevated Route', showlegend: false
                });
            }

            // Opportunities
            if (visibleOpps.length > 0) {
                const minPop = Math.min(...visibleOpps.map(o => o.populationPotential));
                const maxPop = Math.max(...visibleOpps.map(o => o.populationPotential));
                const sizes = visibleOpps.map(opp => {
                    const norm = (opp.populationPotential - minPop) / (maxPop - minPop);
                    return 8 + norm * 26;
                });

                traces.push({
                    lat: visibleOpps.map(o => o.lat),
                    lon: visibleOpps.map(o => o.lon),
                    mode: 'markers',
                    marker: {
                        size: sizes,
                        color: visibleOpps.map(o => o.populationPotential),
                        colorscale: [[0, '#1E4F9F'], [0.35, '#69B8E8'], [0.65, '#A7D96A'], [1, '#F2D53C']],
                        cmin: minPop,
                        cmax: maxPop,
                        colorbar: {
                            title: 'Population<br>potential',
                            x: 0.99
                        },
                        line: { width: 1, color: 'rgba(255,255,255,0.7)' },
                        opacity: 0.82
                    },
                    customdata: visibleOpps.map(o => [o.station, o.landUse, o.populationPotential, o.distance.toFixed(0)]),
                    hovertemplate: '<b>%{customdata[0]}</b><br>Land use: %{customdata[1]}<br>Nearby population: %{customdata[2]:,.0f}<br>Distance: %{customdata[3]} m<extra></extra>',
                    name: 'Land Use + Population'
                });
            }

            // Existing stations
            traces.push({
                lat: existingStations.map(s => s.lat),
                lon: existingStations.map(s => s.lon),
                mode: 'markers',
                marker: {
                    size: 12,
                    color: '#1F2A44',
                    line: { width: 2, color: '#FFFFFF' }
                },
                text: existingStations.map(s => s.name),
                hovertemplate: '<b>%{text}</b><br>Existing station<extra></extra>',
                name: 'Existing Stations'
            });

            // Proposed stations
            const elStations = proposedStations.filter(s => !s.isUnderground);
            const ugStations = proposedStations.filter(s => s.isUnderground);

            if (elStations.length > 0) {
                traces.push({
                    lat: elStations.map(s => s.lat),
                    lon: elStations.map(s => s.lon),
                    mode: 'markers+text',
                    marker: { size: 16, color: '#0B3A6E', line: { width: 2, color: '#E9F1FF' } },
                    text: elStations.map(s => s.name),
                    textposition: 'top center',
                    textfont: { size: 10, color: '#263238' },
                    hovertemplate: '<b>%{text}</b><br>Elevated Station<extra></extra>',
                    name: 'Elevated Stations'
                });
            }

            if (ugStations.length > 0) {
                traces.push({
                    lat: ugStations.map(s => s.lat),
                    lon: ugStations.map(s => s.lon),
                    mode: 'markers+text',
                    marker: { size: 16, color: '#D84315', line: { width: 2, color: '#FFCCBC' } },
                    text: ugStations.map(s => s.name),
                    textposition: 'top center',
                    textfont: { size: 10, color: '#D84315' },
                    hovertemplate: '<b>%{text}</b><br>Underground Station<extra></extra>',
                    name: 'Underground Stations'
                });
            }

            const centerLat = proposedStations.reduce((sum, s) => sum + s.lat, 0) / proposedStations.length;
            const centerLon = proposedStations.reduce((sum, s) => sum + s.lon, 0) / proposedStations.length;

            const layout = {
                mapbox: {
                    style: 'carto-positron',
                    center: { lat: centerLat, lon: centerLon },
                    zoom: 11.2
                },
                margin: { l: 0, r: 0, t: 0, b: 0 },
                paper_bgcolor: '#F2F4F7',
                legend: {
                    orientation: 'h',
                    yanchor: 'bottom',
                    y: 0.01,
                    xanchor: 'left',
                    x: 0.01,
                    bgcolor: 'rgba(255,255,255,0.84)'
                }
            };

            Plotly.newPlot('route-map', traces, layout, { responsive: true, displaylogo: false });
        }

        // Slider event listener
        document.getElementById('radius-slider').addEventListener('input', (e) => {
            updateMap(parseInt(e.target.value));
        });

        // Initial map draw
        updateMap(900);
    </script>
</body>
</html>
